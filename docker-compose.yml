services:
  mongodb:
    image: mongo:latest
    container_name: bot_builder_mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db

  app:
    build: .
    container_name: bot_builder_app
    ports:
      - "8001:8001"
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - JWT_SECRET=marsa-maroc-super-secret-key-2024-change-in-prod

volumes:
  mongo_data:
